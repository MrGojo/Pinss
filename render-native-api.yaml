# Split deploy: API only (no Docker). Use this OR render.yaml — not both for the same service.
# https://render.com/docs/blueprint-spec
#
# After deploy, set CORS_ORIGINS to your static frontend origin(s), e.g.:
#   https://your-app.vercel.app
# Comma-separate multiple: https://a.com,https://www.a.com

services:
  - type: web
    name: pinterest-bott-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: pinterest_pins
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
