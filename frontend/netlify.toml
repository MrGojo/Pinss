# Netlify: set site root to this repo folder (PinterestBott/frontend) OR monorepo base + base dir.
# Required env at build time: REACT_APP_BACKEND_URL=https://your-api.onrender.com (no trailing slash)

[build]
  command = "yarn install && yarn build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"

# SPA fallback (safe for CRA; static assets are matched first)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
