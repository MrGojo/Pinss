# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Full-stack (UI+API in one service): Dockerfile below.
# Split deploy (API only): set dockerfilePath to ./Dockerfile.api and deploy frontend on Vercel/Netlify.
# For no-database mode: do not set MONGO_URL (pins stay on the server until download or eviction).

services:
  - type: web
    name: pinterest-bott
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: pinterest_pins
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
