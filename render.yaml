# Render Blueprint: https://render.com/docs/blueprint-spec
# Set GEMINI_API_KEY in the Render dashboard (Environment) — never put the real key in this file.

services:
  - type: web
    name: pinterest-bott
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
