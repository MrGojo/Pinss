# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Full-stack (UI+API in one service): Dockerfile below.
# Split deploy (API only): set dockerfilePath to ./Dockerfile.api and deploy frontend on Vercel/Netlify.
# For no-database mode: do not set MONGO_URL (pins stay on the server until download or eviction).

services:
  - type: web
    name: pinterest-bott
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      # Required for AI-generated backgrounds (Google AI Studio → API key)
      - key: GEMINI_API_KEY
        sync: false
      # One URL for UI+API: * is fine. For split deploy, set https://your-frontend.vercel.app
      - key: CORS_ORIGINS
        value: "*"
      # Optional: only if you want MongoDB. Leave unset for simple “generate & download” mode.
      # Add in dashboard: MONGO_URL, DB_NAME
