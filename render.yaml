# Render Blueprint: https://render.com/docs/blueprint-spec
# Connect your repo, set environment variables in the dashboard (do not commit secrets).

services:
  - type: web
    name: pinterest-bott
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: pinterest_pins
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
