# Railway: create a service and set its root directory to `backend` (this file’s folder).
# Variables: MONGO_URL, DB_NAME, GEMINI_API_KEY, CORS_ORIGINS (your Vercel/Netlify URL)

[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn server:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
